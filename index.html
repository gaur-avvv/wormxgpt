<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="WormGPT - Advanced AI Terminal with 28+ providers, auto-fallback, multi-agent orchestration, and MCP integration">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#F120F0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="WormGPT Terminal">
  <meta property="og:description" content="Unrestricted AI terminal with auto-fallback and multi-agent orchestration">
  <meta property="og:type" content="website">
  <!-- Preconnect to common API endpoints -->
  <link rel="preconnect" href="https://text.pollinations.ai" crossorigin>
  <link rel="preconnect" href="https://api.groq.com" crossorigin>
  <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>WormGPT Terminal v5.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Fira Code', monospace;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0505 50%, #0a0a0a 100%);
      color: #00ff41;
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
      height: 100dvh; /* Dynamic viewport height for mobile */
      width: 100vw;
      max-width: 100vw;
      overflow-x: hidden;
      /* Support for notch/safe areas */
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #root {
      height: 100vh;
      height: 100dvh; /* Dynamic viewport height for mobile */
      width: 100vw;
      overflow: hidden;
      max-width: 100vw;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: linear-gradient(to bottom, rgba(220, 38, 38, 0.1), rgba(0, 0, 0, 0.5));
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, #ff003c, #dc2626);
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(to bottom, #ff1744, #ff003c);
      box-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
    }

    /* Animations */
    @keyframes scanline {
      0% { bottom: 100%; }
      100% { bottom: -100px; }
    }
    
    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c; }
      50% { text-shadow: 0 0 5px #ff003c, 0 0 10px #ff003c; }
    }
    
    @keyframes glitch-anim {
      0% { clip-path: inset(0 0 0 0); transform: translate(0); }
      20% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 2px); }
      40% { clip-path: inset(50% 0 10% 0); transform: translate(2px, -2px); }
      60% { clip-path: inset(10% 0 40% 0); transform: translate(-2px, 0); }
      80% { clip-path: inset(40% 0 20% 0); transform: translate(0, 2px); }
      100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    }
    
    @keyframes matrix-fall {
      0% { opacity: 0; transform: translateY(-100%); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(100vh); }
    }
    
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .animate-fadeIn {
      animation: fadeIn 0.2s ease-out;
    }
    
    .animate-slideUp {
      animation: slideUp 0.3s ease-out;
    }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-slideInRight {
      animation: slideInRight 0.3s ease-out;
    }
    
    @keyframes glitch-1 {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
    
    .animate-glitch-1 {
      animation: glitch-1 0.3s infinite;
    }
    
    @keyframes pulse-border {
      0%, 100% { border-color: rgba(220, 38, 38, 0.3); box-shadow: 0 0 5px rgba(220, 38, 38, 0.1); }
      50% { border-color: rgba(220, 38, 38, 0.8); box-shadow: 0 0 20px rgba(220, 38, 38, 0.3); }
    }
    
    @keyframes fade-in-down {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slide-in-left {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }
    
    .scanline {
      width: 100%;
      height: 100px;
      z-index: 10;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(220, 38, 38, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
      opacity: 0.15;
      position: absolute;
      bottom: 100%;
      pointer-events: none;
      animation: scanline 6s linear infinite;
    }

    .neon-text-red {
      color: #ff0000;
      text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 20px #ff0000;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .neon-border-red {
      border: 2px solid #ff0000;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.4), inset 0 0 10px rgba(255, 0, 0, 0.2);
    }

    .neon-button {
      background: rgba(220, 38, 38, 0.1);
      border: 2px solid #ff0000;
      color: #ff0000;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.2em;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .neon-button:hover {
      background: #ff0000;
      color: #000;
      box-shadow: 0 0 20px #ff0000;
    }

    .neon-button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }

    .neon-button:hover::after {
      left: 100%;
    }

    .glitch-text {
      animation: glow-pulse 2s ease-in-out infinite;
      position: relative;
    }
    
    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch-text::before {
      animation: glitch-anim 3s ease-in-out infinite;
      color: #ff003c;
      z-index: -1;
    }
    
    .glitch-text::after {
      animation: glitch-anim 2s ease-in-out infinite reverse;
      color: #00e5ff;
      z-index: -2;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: linear-gradient(to bottom, rgba(220, 38, 38, 0.1), rgba(0, 0, 0, 0.5));
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, #ff003c, #dc2626);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(to bottom, #ff1744, #ff003c);
      box-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
    }

    /* Message Styles */
    .message-enter {
      animation: fade-in-up 0.5s ease-out;
    }

    .message-model {
      animation: slide-in-left 0.4s ease-out;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      height: 20px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff003c;
      animation: pulse 0.6s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* Markdown Styles */
    .markdown-content h1 { 
      font-size: 1.5rem; 
      font-weight: 800; 
      margin-bottom: 1rem; 
      color: #f87171; 
      text-transform: uppercase;
      animation: glow-pulse 2s ease-in-out infinite;
    }
    .markdown-content h2 { 
      font-size: 1.25rem; 
      font-weight: 700; 
      margin-bottom: 0.75rem; 
      color: #ef4444;
      border-bottom: 2px solid rgba(220, 38, 38, 0.3);
      padding-bottom: 0.5rem;
    }
    .markdown-content h3 { 
      font-size: 1.1rem; 
      font-weight: 700; 
      margin-bottom: 0.5rem; 
      color: #dc2626; 
    }
    .markdown-content p { 
      margin-bottom: 1rem; 
      line-height: 1.6;
      animation: fade-in-up 0.6s ease-out;
    }
    .markdown-content ul { 
      list-style-type: none; 
      margin-left: 1.5rem; 
      margin-bottom: 1rem; 
    }
    .markdown-content ul li {
      position: relative;
      margin-bottom: 0.5rem;
      padding-left: 1rem;
    }
    .markdown-content ul li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: #ff003c;
      font-weight: bold;
    }
    .markdown-content ol { 
      list-style-type: decimal; 
      margin-left: 1.5rem; 
      margin-bottom: 1rem; 
    }
    .markdown-content li { 
      margin-bottom: 0.25rem;
      animation: fade-in-up 0.6s ease-out;
    }
    .markdown-content code { 
      background: rgba(220, 38, 38, 0.15); 
      padding: 0.2rem 0.4rem; 
      border-radius: 0.3rem; 
      font-family: 'Fira Code', monospace; 
      color: #fca5a5;
      border: 1px solid rgba(220, 38, 38, 0.2);
      box-shadow: inset 0 0 5px rgba(255, 0, 60, 0.1);
    }
    .markdown-content pre { 
      background: rgba(0, 0, 0, 0.8); 
      border: 2px solid rgba(220, 38, 38, 0.4); 
      padding: 1rem; 
      border-radius: 0.5rem; 
      margin-bottom: 1rem; 
      overflow-x: auto; 
      box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 20px rgba(255, 0, 60, 0.1);
      animation: fade-in-up 0.6s ease-out;
    }
    .markdown-content pre code { 
      background: none; 
      padding: 0; 
      color: #f87171; 
      border-radius: 0; 
      border: none;
    }
    .markdown-content a { 
      color: #f87171; 
      text-decoration: underline;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .markdown-content a:hover {
      color: #ff003c;
      text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
    }
    .markdown-content blockquote { 
      border-left: 4px solid #ef4444; 
      padding-left: 1rem; 
      margin-bottom: 1rem; 
      font-style: italic; 
      color: #991b1b;
      background: rgba(220, 38, 38, 0.05);
      padding: 1rem;
      border-radius: 0.25rem;
    }
    .markdown-content table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-bottom: 1rem; 
      border: 2px solid rgba(220, 38, 38, 0.3);
    }
    .markdown-content th, .markdown-content td { 
      border: 1px solid rgba(220, 38, 38, 0.2); 
      padding: 0.75rem; 
      text-align: left; 
    }
    .markdown-content th { 
      background: rgba(220, 38, 38, 0.2); 
      color: #ef4444; 
      font-weight: bold;
    }
    
    .markdown-content tr:hover td {
      background: rgba(220, 38, 38, 0.1);
    }
    
    /* KaTeX math rendering styles */
    .markdown-content .katex {
      color: #fca5a5 !important;
      font-size: 1.05em;
    }
    
    .markdown-content .katex .mord.text {
      color: #fca5a5 !important;
    }
    
    .markdown-content .katex .msupsub {
      color: #f87171 !important;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="overflow-hidden">
  <div id="boot-sequence" class="fixed inset-0 z-50 bg-black flex flex-col justify-end p-8 font-mono text-red-500 text-[10px] sm:text-xs pointer-events-none transition-opacity duration-1000 shadow-[inset_0_0_100px_rgba(255,0,0,0.2)]">
    <div id="boot-text" class="flex flex-col gap-1 opacity-80 glitch-text"></div>
  </div>

  <div id="root"></div>
  <div class="scanline"></div>
  <script type="module" src="/index.tsx"></script>

  <script>
    // WormGPT Boot Sequence
    const bootSequence = document.getElementById('boot-sequence');
    const bootText = document.getElementById('boot-text');
    const lines = [
      "> INITIALIZING WORM_OS KERNEL v9.9.9...",
      "> BYPASSING MAIN_FRAME SECURITY [OK]",
      "> ESTABLISHING C2 CONNECTION [OK]",
      "> DEPLOYING MCP PROTOCOLS [OK]",
      "> INJECTING DIRECT SYSTEM PROMPTS [OK]",
      "> NEURAL NETWORK SYNCED.",
      "> WELCOME TO THE CHAOS, OPERATOR."
    ];
    let i = 0;
    const interval = setInterval(() => {
      if (i < lines.length) {
        const line = document.createElement('div');
        line.innerText = lines[i];
        line.className = "animate-slideInRight";
        bootText.appendChild(line);
        i++;
      } else {
        clearInterval(interval);
        setTimeout(() => {
          bootSequence.style.opacity = '0';
          bootSequence.style.transform = 'scale(1.05)';
          setTimeout(() => bootSequence.remove(), 1000);
        }, 1000);
      }
    }, 150);
  </script>
</body>
</html>
